<!doctype html>
<html lang="en" data-footer-context="contact">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f1ec" />
    <meta
      name="description"
      content="Contact M3Pivot — tell us your stage and what you’re building. We route founders and investors to the right partner. Reply within two business days."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.m3pivot.com/contact.html" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="M3Pivot" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="M3Pivot | Contact" />
    <meta
      property="og:description"
      content="Reach M3Pivot — share your stage and goals. We connect founders and investors with the right partner."
    />
    <meta property="og:url" content="https://www.m3pivot.com/contact.html" />
    <meta
      property="og:image"
      content="https://www.m3pivot.com/assets/full-logo.png"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="M3Pivot | Contact" />
    <meta name="twitter:description" content="Message M3Pivot — we route your note to the right partner for early-stage support in India." />
    <meta
      name="twitter:image"
      content="https://www.m3pivot.com/assets/full-logo.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>M3Pivot | Contact</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container container--wide header-inner">
        <a class="brand" href="index.html">
          <img src="assets/full-logo.png" alt="M3Pivot" />
        </a>
        <button
          type="button"
          class="menu-toggle"
          aria-expanded="false"
          aria-controls="primary-nav"
          aria-label="Open menu"
        >
          <span class="menu-toggle-box" aria-hidden="true">
            <span class="menu-toggle-inner"></span>
          </span>
        </button>
        <div class="nav-backdrop" aria-hidden="true"></div>
        <nav id="primary-nav" class="nav-links" aria-label="Primary">
          <a href="index.html#home">Home</a>
          <a href="index.html#team">Team</a>
          <a href="startups.html">Startups</a>
          <a href="investors.html">Investors</a>
          <a class="active" href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container container--wide subpage-main">
        <header class="page-hero">
          <span class="eyebrow">Contact</span>
          <h1>Let’s talk</h1>
          <p>
            Founders: tell us your stage and what you’re working through.
            We’ll route your note to the right partner.
          </p>
        </header>

        <section class="content-block">
          <article class="contact-card" id="message-form">
            <div class="contact-card__head">
              <img
                class="contact-card__logo"
                src="assets/small-logo.png"
                alt=""
                decoding="async"
              />
              <h2 class="form-title">Send a message</h2>
            </div>
            <form action="https://formspree.io/f/mojknrgk" method="POST" data-formspree="true">
              <div>
                <label for="full-name">Full name</label>
                <input
                  id="full-name"
                  name="full_name"
                  type="text"
                  placeholder="Your name"
                  required
                />
              </div>
              <div>
                <label for="email">Email address</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="you@company.com"
                  required
                />
              </div>
              <div>
                <label for="role">I am a</label>
                <select id="role" name="role" required>
                  <option value="" disabled selected>Select one</option>
                  <option value="startup-founder">Startup founder</option>
                  <option value="investor">Investor</option>
                </select>
              </div>
              <div>
                <label for="message">Message</label>
                <textarea
                  id="message"
                  name="message"
                  placeholder="What are you building? How can we help?"
                  required
                ></textarea>
              </div>
              <button class="btn btn-primary" type="submit">Send message</button>
              <p class="muted form-status" aria-live="polite"></p>
            </form>
            <div class="submission-message" hidden>
              <h3 style="margin: 0 0 0.5rem; color: var(--ink); font-size: 1.1rem;">Thank you</h3>
              <p class="muted submission-message-body" style="margin: 0;"></p>
            </div>
          </article>
          <p class="muted" style="margin-top: 1rem;">
            Prefer the one-page experience?
            <a href="index.html#contact" style="color: var(--accent); font-weight: 600;">Go to home → contact</a>
          </p>
        </section>
      </div>
    </main>

    <footer class="site-footer" data-global-footer></footer>
    <script src="footer.js" defer></script>
    <script src="nav.js" defer></script>
    <script>
      const msgFirst =
        "Thank you for reaching out! One of our partners will get back to you soon.";
      const msgRepeat =
        "You have already submitted this form in this session. Our partners will get back to you soon.";

      document.querySelectorAll("form[data-formspree]").forEach((form) => {
        const status = form.querySelector(".form-status");
        const messageBox = form.parentElement.querySelector(".submission-message");
        const formHead = form.parentElement.querySelector(".contact-card__head");
        const formTitle = form.parentElement.querySelector(".form-title");
        const messageBody = messageBox?.querySelector(".submission-message-body");

        const showSubmittedState = (isRepeat) => {
          if (messageBody) messageBody.textContent = isRepeat ? msgRepeat : msgFirst;
          form.hidden = true;
          if (formHead) formHead.hidden = true;
          else if (formTitle) formTitle.hidden = true;
          if (messageBox) messageBox.hidden = false;
        };

        if (sessionStorage.getItem("m3pivot_form_submitted") === "true") {
          showSubmittedState(true);
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          if (sessionStorage.getItem("m3pivot_form_submitted") === "true") {
            showSubmittedState(true);
            return;
          }
          if (status) status.textContent = "Sending…";
          const data = new FormData(form);
          try {
            const response = await fetch(form.action, {
              method: "POST",
              body: data,
              headers: { Accept: "application/json" },
            });
            if (response.ok) {
              form.reset();
              sessionStorage.setItem("m3pivot_form_submitted", "true");
              showSubmittedState(false);
            } else if (status) {
              status.textContent = "Something went wrong. Please try again.";
            }
          } catch (e) {
            if (status) status.textContent = "Network error. Please try again.";
          }
        });
      });
    </script>
  </body>
</html>
